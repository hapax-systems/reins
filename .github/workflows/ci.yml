name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write
  security-events: write
  pull-requests: read

jobs:
  go-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod
      - name: Check gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::Go files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod
      - run: go test -coverprofile=coverage-go.out ./...
      - name: Upload Go coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: go-coverage-report
          path: coverage-go.out
          if-no-files-found: ignore
      - name: Upload Go coverage to Codecov
        if: >-
          always() &&
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac
        with:
          files: ./coverage-go.out
          flags: go
          name: reins-go
          fail_ci_if_error: false
          use_oidc: true

  python-api-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      - run: uv run --with pytest --with pytest-cov pytest -q --cov=reins_read --cov-report=xml:coverage.xml --cov-report=term
      - name: Upload Python API coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: python-api-coverage-report
          path: api/coverage.xml
          if-no-files-found: ignore
      - name: Upload Python API coverage to Codecov
        if: >-
          always() &&
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac
        with:
          files: ./api/coverage.xml
          flags: python-api
          name: reins-python-api
          fail_ci_if_error: false
          use_oidc: true

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: "1.25.x"
      - name: Run Gitleaks
        run: |
          tmp="$RUNNER_TEMP/gitleaks-source"
          mkdir -p "$tmp"
          git ls-files -z | rsync --files-from=- --from0 -a ./ "$tmp"/
          go run github.com/zricethezav/gitleaks/v8@latest dir --redact --verbose "$tmp"

  all-green:
    name: all-green
    runs-on: ubuntu-latest
    needs:
      - go-format
      - go-test
      - python-api-test
      - secrets-scan
    if: always()
    steps:
      - name: Require required jobs to pass
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          if [ "$RESULTS" != "success,success,success,success" ]; then
            echo "::error::Required job results: $RESULTS"
            exit 1
          fi
